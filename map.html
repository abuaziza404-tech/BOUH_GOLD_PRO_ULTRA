<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>BOUH Map GPS</title>
<style>
:root{
  --bg:#0b1120;--panel:#111827;--panel2:#172033;--text:#e5e7eb;--muted:#9ca3af;
  --gold:#f4c542;--cyan:#67e8f9;--red:#f87171;--green:#34d399;--line:#2b3448;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Tahoma,Arial;background:var(--bg);color:var(--text);overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
#topbar{height:64px;background:linear-gradient(135deg,#0f172a,#111827);display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--line)}
#logo{width:42px;height:42px;border-radius:14px;background:radial-gradient(circle at 35% 25%,#fde68a,#b45309 55%,#111827);box-shadow:0 0 18px rgba(244,197,66,.35)}
#title{flex:1;line-height:1.2}
#title b{display:block;font-size:16px;color:#fff}
#title span{font-size:11px;color:var(--muted)}
button{border:1px solid #374151;background:#1f2937;color:#fff;border-radius:12px;padding:9px 10px;font-weight:700}
button:active{transform:scale(.98)}
#mapWrap{position:relative;flex:1;overflow:hidden;background:#101827}
#map{position:absolute;inset:0;touch-action:none;background:
  radial-gradient(circle at 25% 30%,rgba(156,163,175,.18),transparent 25%),
  linear-gradient(120deg,rgba(120,53,15,.35),transparent 40%),
  linear-gradient(25deg,rgba(15,23,42,.8),rgba(31,41,55,.95));
}
.tile{position:absolute;width:256px;height:256px;background:#1f2937;border:1px solid rgba(255,255,255,.03)}
.tile img{width:256px;height:256px;display:block}
#overlay{position:absolute;inset:0;pointer-events:none}
#hud{position:absolute;left:10px;right:10px;bottom:10px;background:rgba(17,24,39,.88);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:10px;box-shadow:0 8px 28px rgba(0,0,0,.35)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px}
.card{background:rgba(31,41,55,.85);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px}
.label{display:block;color:var(--muted);font-size:10px}
.value{font-weight:800;color:#fff;direction:ltr;text-align:left}
#tools{position:absolute;right:10px;top:10px;display:flex;flex-direction:column;gap:8px}
.tool{width:46px;height:46px;border-radius:16px;background:rgba(17,24,39,.88)}
#layers{position:absolute;left:10px;top:10px;width:210px;background:rgba(17,24,39,.92);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:10px;display:none}
#layers h3{font-size:13px;margin:0 0 8px;color:#fff}
.row{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:12px;color:#e5e7eb}
input[type=range]{width:100%}
#status{position:absolute;right:10px;left:10px;top:74px;text-align:center;color:#fff;background:rgba(0,0,0,.25);padding:5px;border-radius:10px;font-size:11px;pointer-events:none}
.badge{display:inline-block;border-radius:999px;padding:2px 8px;background:#374151;color:#d1d5db;font-size:10px}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="logo"></div>
    <div id="title">
      <b>بوح التضاريس | Map GPS</b>
      <span>Geology • Remote Sensing • Radar Overlay • GPZ Field Navigation</span>
    </div>
    <button onclick="toggleLayers()">طبقات</button>
  </div>
  <div id="mapWrap">
    <div id="map"></div>
    <canvas id="overlay"></canvas>
    <div id="status">جاهز — استخدم GPS أو اسحب الخريطة</div>
    <div id="tools">
      <button class="tool" onclick="locateMe()">GPS</button>
      <button class="tool" onclick="zoomBy(1)">+</button>
      <button class="tool" onclick="zoomBy(-1)">−</button>
      <button class="tool" onclick="toggleRadar()">RAD</button>
    </div>
    <div id="layers">
      <h3>طبقات العرض</h3>
      <label class="row"><input type="checkbox" id="chkTiles" checked onchange="draw()"> Online/Offline Tiles</label>
      <label class="row"><input type="checkbox" id="chkGeo" checked onchange="draw()"> Geological GeoJSON</label>
      <label class="row"><input type="checkbox" id="chkTargets" checked onchange="draw()"> Target Circles 30m</label>
      <label class="row"><input type="checkbox" id="chkRadar" checked onchange="draw()"> Radar View</label>
      <div class="row" style="display:block">شفافية الرادار <input id="radarAlpha" type="range" min="0" max="100" value="45" oninput="draw()"></div>
      <div class="badge">ضع ملفاتك داخل assets: layers.geojson و targets.csv</div>
    </div>
    <div id="hud">
      <div class="grid">
        <div class="card"><span class="label">Latitude</span><div class="value" id="lat">--</div></div>
        <div class="card"><span class="label">Longitude</span><div class="value" id="lon">--</div></div>
        <div class="card"><span class="label">Zoom / Scale</span><div class="value" id="zoom">12</div></div>
        <div class="card"><span class="label">Mode</span><div class="value" id="mode">BOUH Radar</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const mapEl=document.getElementById('map'), canvas=document.getElementById('overlay'), ctx=canvas.getContext('2d');
let W=0,H=0, zoom=12, center={lat:19.80,lon:36.48}, dragging=false, last={x:0,y:0};
let features=[], targets=[], radar=true, gps=null, tileUrl='https://tile.openstreetmap.org/{z}/{x}/{y}.png';
// للخرائط الأوفلاين: ضع tiles داخل assets/tiles/z/x/y.png ثم غيّر السطر إلى:
// let tileUrl='tiles/{z}/{x}/{y}.png';

function resize(){W=canvas.width=mapEl.clientWidth;H=canvas.height=mapEl.clientHeight;renderTiles();draw();}
window.addEventListener('resize',resize);

function lon2x(lon,z){return (lon+180)/360*Math.pow(2,z)*256}
function lat2y(lat,z){let r=lat*Math.PI/180;return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z)*256}
function x2lon(x,z){return x/(Math.pow(2,z)*256)*360-180}
function y2lat(y,z){let n=Math.PI-2*Math.PI*y/(Math.pow(2,z)*256);return 180/Math.PI*Math.atan(0.5*(Math.exp(n)-Math.exp(-n)))}
function project(lat,lon){let cx=lon2x(center.lon,zoom), cy=lat2y(center.lat,zoom);return {x:lon2x(lon,zoom)-cx+W/2,y:lat2y(lat,zoom)-cy+H/2}}
function unproject(px,py){let cx=lon2x(center.lon,zoom), cy=lat2y(center.lat,zoom);return {lon:x2lon(cx+px-W/2,zoom),lat:y2lat(cy+py-H/2,zoom)}}

function renderTiles(){
  mapEl.querySelectorAll('.tile').forEach(e=>e.remove());
  if(!document.getElementById('chkTiles')?.checked) return;
  const cx=lon2x(center.lon,zoom), cy=lat2y(center.lat,zoom);
  const startX=Math.floor((cx-W/2)/256), endX=Math.floor((cx+W/2)/256);
  const startY=Math.floor((cy-H/2)/256), endY=Math.floor((cy+H/2)/256);
  const max=Math.pow(2,zoom);
  for(let tx=startX;tx<=endX;tx++){
    for(let ty=startY;ty<=endY;ty++){
      if(ty<0||ty>=max) continue;
      const wrapX=((tx%max)+max)%max;
      const div=document.createElement('div');
      div.className='tile';
      div.style.left=(tx*256-cx+W/2)+'px';
      div.style.top=(ty*256-cy+H/2)+'px';
      const img=new Image();
      img.decoding='async';
      img.loading='lazy';
      img.src=tileUrl.replace('{z}',zoom).replace('{x}',wrapX).replace('{y}',ty);
      img.onerror=()=>{img.remove();div.style.background='linear-gradient(135deg,#1f2937,#111827)';};
      div.appendChild(img);
      mapEl.appendChild(div);
    }
  }
}

function metersToPixels(m,lat){const metersPerPixel=156543.03392*Math.cos(lat*Math.PI/180)/Math.pow(2,zoom);return m/metersPerPixel}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawGrid();
  if(document.getElementById('chkGeo')?.checked) drawGeo();
  if(document.getElementById('chkTargets')?.checked) drawTargets();
  if(document.getElementById('chkRadar')?.checked && radar) drawRadar();
  drawGps();
  document.getElementById('lat').textContent=center.lat.toFixed(6);
  document.getElementById('lon').textContent=center.lon.toFixed(6);
  document.getElementById('zoom').textContent=String(zoom);
}

function drawGrid(){
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.055)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
}

function drawGeo(){
  ctx.save();
  ctx.lineWidth=3;
  for(const f of features){
    const g=f.geometry; if(!g) continue;
    if(g.type==='LineString'){
      ctx.strokeStyle='rgba(103,232,249,.78)';
      ctx.beginPath();
      g.coordinates.forEach((c,i)=>{const p=project(c[1],c[0]); i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y);});
      ctx.stroke();
    }
    if(g.type==='Polygon'){
      ctx.fillStyle='rgba(244,197,66,.18)';
      ctx.strokeStyle='rgba(244,197,66,.72)';
      g.coordinates.forEach(r=>{
        ctx.beginPath();
        r.forEach((c,i)=>{const p=project(c[1],c[0]); i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y);});
        ctx.closePath();ctx.fill();ctx.stroke();
      });
    }
  }
  ctx.restore();
}

function drawTargets(){
  ctx.save();
  for(const t of targets){
    const p=project(+t.lat,+t.lon), r=metersToPixels(+t.radius_m||30,+t.lat);
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle='rgba(244,197,66,.16)';ctx.fill();
    ctx.lineWidth=2;ctx.strokeStyle='rgba(244,197,66,.95)';ctx.stroke();
    ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle='#f4c542';ctx.fill();
    ctx.font='bold 12px system-ui';ctx.fillStyle='#fff';ctx.fillText(t.id||t.name||'T',p.x+8,p.y-8);
  }
  ctx.restore();
}

function drawRadar(){
  const a=(+document.getElementById('radarAlpha').value||45)/100;
  const cx=W/2, cy=H/2;
  ctx.save();
  const grd=ctx.createRadialGradient(cx,cy,20,cx,cy,Math.max(W,H)*.65);
  grd.addColorStop(0,`rgba(52,211,153,${a*.22})`);
  grd.addColorStop(.55,`rgba(103,232,249,${a*.14})`);
  grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=`rgba(52,211,153,${a})`;ctx.lineWidth=1.2;
  for(let r=70;r<Math.max(W,H);r+=70){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();}
  for(let ang=0;ang<360;ang+=30){
    const rad=ang*Math.PI/180;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(rad)*W,cy+Math.sin(rad)*W);ctx.stroke();
  }
  ctx.restore();
}

function drawGps(){
  if(!gps) return;
  const p=project(gps.lat,gps.lon);
  ctx.save();
  ctx.beginPath();ctx.arc(p.x,p.y,metersToPixels(gps.acc||20,gps.lat),0,Math.PI*2);
  ctx.fillStyle='rgba(96,165,250,.12)';ctx.fill();
  ctx.strokeStyle='rgba(96,165,250,.7)';ctx.stroke();
  ctx.beginPath();ctx.arc(p.x,p.y,7,0,Math.PI*2);
  ctx.fillStyle='#60a5fa';ctx.fill();ctx.lineWidth=3;ctx.strokeStyle='#fff';ctx.stroke();
  ctx.restore();
}

function zoomBy(d){
  zoom=Math.max(3,Math.min(19,zoom+d));
  renderTiles();draw();
}

function toggleLayers(){
  const el=document.getElementById('layers'); el.style.display=el.style.display==='block'?'none':'block';
}
function toggleRadar(){radar=!radar;document.getElementById('chkRadar').checked=radar;draw();}

function locateMe(){
  setStatus('جارٍ تحديد الموقع...');
  if(window.BouhAndroid){
    try{
      const res=JSON.parse(BouhAndroid.getLastKnownLocation());
      if(res.ok){
        gps={lat:res.lat,lon:res.lon,acc:res.acc,alt:res.alt,time:res.time};
        center={lat:res.lat,lon:res.lon};
        renderTiles();draw();
        setStatus('تم تحديث GPS بدقة تقريبية: '+Math.round(res.acc)+'m');
      } else {
        setStatus('لا توجد إشارة GPS حالية: '+res.error);
        if(res.error==='NO_PERMISSION') alert('امنح إذن الموقع للتطبيق.');
      }
    }catch(e){setStatus('خطأ GPS: '+e.message)}
  } else if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      gps={lat:pos.coords.latitude,lon:pos.coords.longitude,acc:pos.coords.accuracy};
      center={lat:gps.lat,lon:gps.lon};renderTiles();draw();setStatus('GPS Web updated');
    },err=>setStatus('GPS error '+err.message),{enableHighAccuracy:true,timeout:8000});
  }
}

function setStatus(s){document.getElementById('status').textContent=s;}

mapEl.addEventListener('pointerdown',e=>{dragging=true;last={x:e.clientX,y:e.clientY};mapEl.setPointerCapture(e.pointerId)});
mapEl.addEventListener('pointermove',e=>{
  if(!dragging) return;
  const dx=e.clientX-last.x, dy=e.clientY-last.y; last={x:e.clientX,y:e.clientY};
  const cx=lon2x(center.lon,zoom)-dx, cy=lat2y(center.lat,zoom)-dy;
  center={lat:y2lat(cy,zoom),lon:x2lon(cx,zoom)};
  renderTiles();draw();
});
mapEl.addEventListener('pointerup',e=>{dragging=false});
mapEl.addEventListener('wheel',e=>{e.preventDefault();zoomBy(e.deltaY<0?1:-1)},{passive:false});

async function loadData(){
  try{
    const gj=await fetch('layers.geojson').then(r=>r.json());
    features=gj.features||[];
  }catch(e){features=[];}
  try{
    const txt=await fetch('targets.csv').then(r=>r.text());
    const lines=txt.trim().split(/\r?\n/); const head=lines.shift().split(',');
    targets=lines.map(line=>{
      const cols=line.split(','); let o={};
      head.forEach((h,i)=>o[h.trim()]=(cols[i]||'').trim());
      return o;
    });
  }catch(e){targets=[];}
  resize();setInterval(locateMe,20000);
}
loadData();
</script>
</body>
</html>
