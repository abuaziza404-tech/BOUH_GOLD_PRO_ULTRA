name: Build BOUH Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter Stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Create BOUH Flutter project
        run: |
          rm -rf android ios lib test web linux macos windows build .dart_tool pubspec.yaml pubspec.lock analysis_options.yaml

          flutter create . --platforms=android --project-name bouh_gold

          cat > pubspec.yaml <<'EOF'
          name: bouh_gold
          description: BOUH GOLD DEEP DETECTOR V12.5
          publish_to: "none"
          version: 12.5.0+125

          environment:
            sdk: ">=3.5.0 <4.0.0"

          dependencies:
            flutter:
              sdk: flutter

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0

          flutter:
            uses-material-design: true
          EOF

          mkdir -p lib

          cat > lib/main.dart <<'EOF'
          import 'package:flutter/material.dart';

          void main() {
            runApp(const BouhApp());
          }

          class BouhApp extends StatelessWidget {
            const BouhApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'BOUH GOLD V12.5',
                theme: ThemeData.dark().copyWith(
                  scaffoldBackgroundColor: const Color(0xFF050805),
                  primaryColor: const Color(0xFFD8B94A),
                ),
                home: const BouhHomePage(),
              );
            }
          }

          class BouhHomePage extends StatefulWidget {
            const BouhHomePage({super.key});

            @override
            State<BouhHomePage> createState() => _BouhHomePageState();
          }

          class _BouhHomePageState extends State<BouhHomePage> {
            final TextEditingController latController = TextEditingController();
            final TextEditingController lonController = TextEditingController();
            final TextEditingController noteController = TextEditingController();

            String result = 'أدخل الإحداثية ثم اضغط تحليل.';
            int score = 0;

            void analyze() {
              final double? lat = double.tryParse(latController.text.trim());
              final double? lon = double.tryParse(lonController.text.trim());

              if (lat == null || lon == null) {
                setState(() {
                  result = 'خطأ: أدخل Latitude و Longitude بشكل صحيح.';
                  score = 0;
                });
                return;
              }

              int localScore = 55;
              String targetClass = 'HOLD / فحص ميداني أولي';
              String gpz = 'GPZ 7000: Ground Type Difficult، Gold Mode High Yield، Sensitivity 8-11.';

              if (lat >= 19.85 && lat <= 20.05 && lon >= 36.70 && lon <= 36.85) {
                localScore = 78;
                targetClass = 'GPZ-Regolith / Dark Slope / Wadi Trap';
                gpz = 'GPZ 7000: Difficult، High Yield، Sensitivity 9-12، Swing بطيء، إعادة فحص بعد الكشط الخفيف.';
              }

              if (lat >= 20.60 && lat <= 20.80 && lon >= 36.38 && lon <= 36.48) {
                localScore = 72;
                targetClass = 'Quartz / Alteration Cluster Field Check';
                gpz = 'GPZ 7000: إذا الأرض هادئة استخدم Normal + General/Deep + Sensitivity 12-15.';
              }

              String decision = 'لا حفر قبل تأكيد ميداني.';
              if (localScore >= 85) {
                decision = 'Target-B محتمل بشرط بيانات خام وتأكيد ميداني.';
              } else if (localScore >= 70) {
                decision = 'Candidate / يستحق فحص GPZ وملاحظة كوارتز وبنية.';
              } else if (localScore >= 55) {
                decision = 'HOLD / فحص سريع فقط.';
              }

              setState(() {
                score = localScore;
                result =
                    'Score: $localScore\n'
                    'Class: $targetClass\n'
                    'Decision: $decision\n\n'
                    '$gpz\n\n'
                    'القانون: Structure → Pattern → Alteration → Confirmation → Decision\n'
                    'التطبيق لا يثبت الذهب وحده. القرار النهائي من GPZ + الأرض + العينة.';
              });
            }

            @override
            Widget build(BuildContext context) {
              return Directionality(
                textDirection: TextDirection.rtl,
                child: Scaffold(
                  appBar: AppBar(
                    backgroundColor: const Color(0xFF0D160D),
                    title: const Text('BOUH GOLD V12.5'),
                    centerTitle: true,
                  ),
                  body: SingleChildScrollView(
                    padding: const EdgeInsets.all(16),
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.stretch,
                      children: [
                        const Text(
                          'BOUH GOLD DEEP DETECTOR',
                          textAlign: TextAlign.center,
                          style: TextStyle(
                            color: Color(0xFFD9FFD9),
                            fontSize: 24,
                            fontWeight: FontWeight.bold,
                          ),
                        ),
                        const SizedBox(height: 6),
                        const Text(
                          'منظومة أبوعزيزة — نسخة Android ميدانية خفيفة',
                          textAlign: TextAlign.center,
                          style: TextStyle(color: Color(0xFF9EB49E), fontSize: 14),
                        ),
                        const SizedBox(height: 20),

                        _card(
                          title: 'إدخال نقطة فحص',
                          child: Column(
                            children: [
                              _input(latController, 'Latitude مثال: 19.973186'),
                              const SizedBox(height: 10),
                              _input(lonController, 'Longitude مثال: 36.745590'),
                              const SizedBox(height: 10),
                              TextField(
                                controller: noteController,
                                minLines: 3,
                                maxLines: 5,
                                style: const TextStyle(color: Colors.white),
                                decoration: _decor('ملاحظات الأرض: كوارتز، أرض سوداء، وادي، حفر قديمة...'),
                              ),
                              const SizedBox(height: 14),
                              SizedBox(
                                width: double.infinity,
                                height: 52,
                                child: ElevatedButton(
                                  style: ElevatedButton.styleFrom(
                                    backgroundColor: const Color(0xFFD8B94A),
                                    foregroundColor: const Color(0xFF071007),
                                    shape: RoundedRectangleBorder(
                                      borderRadius: BorderRadius.circular(14),
                                    ),
                                  ),
                                  onPressed: analyze,
                                  child: const Text(
                                    'تحليل النقطة',
                                    style: TextStyle(fontSize: 17, fontWeight: FontWeight.bold),
                                  ),
                                ),
                              ),
                            ],
                          ),
                        ),

                        _card(
                          title: 'نتيجة BOUH',
                          child: Text(
                            result,
                            style: const TextStyle(
                              color: Color(0xFFDCEBDC),
                              fontSize: 15,
                              height: 1.7,
                            ),
                          ),
                        ),

                        _card(
                          title: 'قانون التشغيل',
                          child: const Text(
                            'الحفر تثبت النموذج، لكنها لا تكون هدف البحث.\n'
                            'هدف البحث هو الأرض التي تشبه ما قبل الحفر.\n\n'
                            'No Structure + No Pattern = Reject أو HOLD.\n'
                            'لا Target-B بدون بيانات خام أو تأكيد ميداني.',
                            style: TextStyle(
                              color: Color(0xFFDCEBDC),
                              fontSize: 15,
                              height: 1.7,
                            ),
                          ),
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }

            Widget _input(TextEditingController controller, String hint) {
              return TextField(
                controller: controller,
                keyboardType: const TextInputType.numberWithOptions(decimal: true, signed: true),
                style: const TextStyle(color: Colors.white),
                decoration: _decor(hint),
              );
            }

            InputDecoration _decor(String hint) {
              return InputDecoration(
                hintText: hint,
                hintStyle: const TextStyle(color: Color(0xFF879887)),
                filled: true,
                fillColor: const Color(0xFF071007),
                enabledBorder: OutlineInputBorder(
                  borderRadius: BorderRadius.circular(12),
                  borderSide: const BorderSide(color: Color(0xFF294429)),
                ),
                focusedBorder: OutlineInputBorder(
                  borderRadius: BorderRadius.circular(12),
                  borderSide: const BorderSide(color: Color(0xFFD8B94A)),
                ),
              );
            }

            Widget _card({required String title, required Widget child}) {
              return Container(
                margin: const EdgeInsets.only(bottom: 16),
                padding: const EdgeInsets.all(16),
                decoration: BoxDecoration(
                  color: const Color(0xFF0D160D),
                  borderRadius: BorderRadius.circular(18),
                  border: Border.all(color: const Color(0xFF244124)),
                ),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.stretch,
                  children: [
                    Text(
                      title,
                      style: const TextStyle(
                        color: Color(0xFFF1D57A),
                        fontSize: 18,
                        fontWeight: FontWeight.bold,
                      ),
                    ),
                    const SizedBox(height: 12),
                    child,
                  ],
                ),
              );
            }
          }
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/BOUH-GOLD-V12-5.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BOUH-GOLD-V12-5-APK
          path: output/BOUH-GOLD-V12-5.apk
