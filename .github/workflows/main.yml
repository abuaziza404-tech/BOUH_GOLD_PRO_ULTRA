name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify project files
        run: |
          echo "Checking project structure..."
          ls -la

          if [ ! -f "package.json" ]; then
            echo "ERROR: package.json not found."
            echo "You must upload the full Expo project files to the repository root."
            exit 1
          fi

          if [ ! -f "App.js" ]; then
            echo "ERROR: App.js not found."
            echo "You must upload App.js to the repository root."
            exit 1
          fi

          if [ ! -f "app.json" ]; then
            echo "ERROR: app.json not found."
            echo "You must upload app.json to the repository root."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate Android native project
        run: npx expo prebuild --platform android --clean

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Prepare APK output
        run: |
          mkdir -p apk-output
          cp android/app/build/outputs/apk/debug/app-debug.apk apk-output/BOUH_GOLD_PRO_ULTRA.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BOUH_GOLD_PRO_ULTRA_APK
          path: apk-output/BOUH_GOLD_PRO_ULTRA.apk
